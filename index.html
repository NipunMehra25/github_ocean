<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Ocean</title>
    <link
      rel="preload"
      href="./assets/media/yqa4hcjdexrmw0cwrygr27qhr0_result_.mp4"
      as="video"
      type="video/mp4"
    />
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon"       href="./assets/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16"  href="./assets/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="./assets/icons/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180"     href="./assets/icons/apple-touch-icon.png" />
    <link rel="manifest"                             href="./site.webmanifest" />
    <meta name="theme-color"                  content="#061424" />
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <canvas id="fish-canvas" aria-hidden="true"></canvas>

    <main class="hero">
      <h1>
        <span class="hero-title-main">Github Ocean</span>
        <a class="hero-title-sub hero-title-link" href="https://nipunmehra25.vercel.app/" target="_blank" rel="noreferrer">By Nipun Mehra</a>
      </h1>
      <p>Find yourself in the Ocean of Developers.</p>
    </main>

    <nav class="social-dock" aria-label="Creator links">
      <a class="social-dock__link" href="https://github.com/nipunmehra25" target="_blank" rel="noreferrer" aria-label="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.03-.01-1.86-2.78.62-3.37-1.22-3.37-1.22-.46-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.55-1.14-4.55-5.08 0-1.12.39-2.03 1.03-2.74-.1-.26-.45-1.3.1-2.72 0 0 .84-.28 2.75 1.05A9.33 9.33 0 0 1 12 6.84c.85 0 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.42.2 2.46.1 2.72.64.71 1.03 1.62 1.03 2.74 0 3.95-2.33 4.82-4.56 5.07.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.27 10.27 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z"/>
        </svg>
        <span>GitHub</span>
      </a>
      <a class="social-dock__link" href="https://nipunmehra25.vercel.app/" target="_blank" rel="noreferrer" aria-label="Portfolio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 18.5v-13Zm2.5-.5a.5.5 0 0 0-.5.5V8h14V5.5a.5.5 0 0 0-.5-.5h-13ZM20 10H6v8.5c0 .28.22.5.5.5h11a.5.5 0 0 0 .5-.5V10Zm-10 2h6a1 1 0 1 1 0 2h-6a1 1 0 1 1 0-2Zm0 4h4a1 1 0 1 1 0 2h-4a1 1 0 1 1 0-2Z"/>
        </svg>
        <span>Portfolio</span>
      </a>
      <a class="social-dock__link" href="https://www.linkedin.com/in/nipunmehra25/" target="_blank" rel="noreferrer" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6.94 8.5A1.56 1.56 0 1 1 6.93 5.4a1.56 1.56 0 0 1 .01 3.1ZM5.59 9.68h2.7V18.5h-2.7V9.68Zm4.4 0h2.58v1.2h.04c.36-.68 1.24-1.4 2.55-1.4 2.73 0 3.24 1.8 3.24 4.14v4.88h-2.69v-4.32c0-1.03-.02-2.36-1.44-2.36-1.44 0-1.66 1.13-1.66 2.29v4.39H10V9.68Z"/>
        </svg>
        <span>LinkedIn</span>
      </a>
    </nav>

    <section class="warp-panel">
      <input id="warp-input" type="text" placeholder="Enter GitHub username..." autocomplete="off" spellcheck="false" />
      <button id="warp-trigger" type="button">Dive</button>
    </section>


    <!-- Sound toggle -->
    <button id="sound-btn" type="button" aria-label="Toggle ocean sound" title="Toggle ocean sound">
      <span id="sound-icon">🔇</span>
    </button>

    <div id="black-overlay" aria-hidden="true">
      <video id="overlay-video-a" class="overlay-video is-active"
        src="./assets/media/yqa4hcjdexrmw0cwrygr27qhr0_result_.mp4" muted playsinline preload="auto"></video>
      <video id="overlay-video-b" class="overlay-video"
        src="./assets/media/yqa4hcjdexrmw0cwrygr27qhr0_result_.mp4" muted playsinline preload="auto"></video>

      <!-- Left pane: fish + viz labels -->
      <div class="overlay-left-pane">
        <!-- Fish name label — shown above the canvas -->
        <div id="overlay-fish-name" hidden></div>

        <div id="model-loader" hidden>
          <span class="loader-spinner" aria-hidden="true"></span>
          <span class="loader-text">Loading creature...</span>
        </div>

        <canvas id="overlay-fish-canvas" aria-hidden="true"></canvas>

        <!-- Fish Size Visualization — sits right below canvas -->
        <div id="fish-viz" hidden>
          <div class="fish-viz-ruler">
            <span class="fish-viz-arrow">←</span>
            <span class="fish-viz-ruler-line"></span>
            <span id="fish-viz-commits" class="fish-viz-count">0 commits</span>
            <span class="fish-viz-ruler-line"></span>
            <span class="fish-viz-arrow">→</span>
          </div>
          <div class="fish-viz-width">
            <span class="fish-viz-width-bracket-left">⌐</span>
            <span id="fish-viz-repos" class="fish-viz-count">0</span>
            <span class="fish-viz-width-unit"> repos wide</span>
            <span class="fish-viz-width-bracket-right">¬</span>
          </div>
        </div>
      </div>

      <!-- Right pane: GitHub stats panel -->
      <aside id="github-panel" hidden>
        <h2 id="github-name">GitHub User</h2>

        <div class="stat-row">
          <span class="stat-label">Username</span>
          <strong id="github-username" class="stat-value">-</strong>
        </div>
        <div class="stat-row">
          <span class="stat-label">Public Repos</span>
          <strong id="github-repos" class="stat-value">-</strong>
        </div>
        <div class="stat-row">
          <span class="stat-label">Commits</span>
          <strong id="github-commits" class="stat-value">-</strong>
        </div>

        <div class="tier-band-row">
          <span id="github-commit-band" class="tier-band">Commit band: -</span>
          <span id="github-repo-band" class="tier-band">Repo band: -</span>
        </div>

        <div class="tier-grid-wrap" id="tier-grid-wrap" hidden>
          <div class="tier-grid-label">Ocean Tier Matrix</div>
          <div class="tier-grid" id="tier-grid">
            <!-- Tier cells built by JS -->
          </div>
        </div>

        <div class="stat-row stat-row--fish">
          <span class="stat-label">Assigned Fish</span>
          <strong id="github-fish" class="stat-value stat-value--fish">-</strong>
        </div>
        <p id="github-fish-lore" class="fish-lore">Dive to unlock creature lore.</p>

        <p id="github-status"></p>
      </aside>

      <!-- Return pinned to bottom -->
      <button id="return-btn" type="button" hidden>↩ Return to ocean</button>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
